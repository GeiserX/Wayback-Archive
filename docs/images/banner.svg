<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#E3F2FD" stroke-width="0.5" fill="none">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Icon: Archive building with rewind clock -->
  <g transform="translate(120, 100)" filter="url(#glow)">
    <!-- Pediment (triangle roof) -->
    <polygon points="0,-52 -44,-22 44,-22" fill="none" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- 4 evenly spaced columns, centered -->
    <rect x="-33" y="-20" width="6" height="50" rx="1" fill="url(#iconGrad)" opacity="0.9"/>
    <rect x="-15" y="-20" width="6" height="50" rx="1" fill="url(#iconGrad)" opacity="0.9"/>
    <rect x="9" y="-20" width="6" height="50" rx="1" fill="url(#iconGrad)" opacity="0.9"/>
    <rect x="27" y="-20" width="6" height="50" rx="1" fill="url(#iconGrad)" opacity="0.9"/>
    <!-- Base -->
    <rect x="-40" y="30" width="80" height="6" rx="1" fill="url(#iconGrad)" opacity="0.8"/>
    <!-- Counterclockwise time arrow (bottom-right of building) -->
    <g transform="translate(32, -38)">
      <path d="M 12,0 A 12,12 0 1,0 0,-12" fill="none" stroke="#42A5F5" stroke-width="2.2" stroke-linecap="round"/>
      <polyline points="-4,-14.5 0,-12 -4.5,-9" fill="none" stroke="#42A5F5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Title -->
  <text x="240" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Wayback-Archive</text>

  <!-- Subtitle -->
  <text x="242" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" fill="#90CAF9" letter-spacing="0.5">Download complete websites from the Wayback Machine</text>

  <!-- Accent line -->
  <rect x="240" y="142" width="80" height="2" rx="1" fill="#42A5F5" opacity="0.6"/>
</svg>