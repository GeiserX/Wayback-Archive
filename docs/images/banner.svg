<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#E3F2FD" stroke-width="0.5" fill="none">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Icon: 3 stacked browser windows, cascading bottom-right -->
  <g transform="translate(115, 95)" filter="url(#glow)">
    <!-- Window 3 (back, bottom-right, most faded) -->
    <g opacity="0.2">
      <rect x="-14" y="-22" width="52" height="64" rx="4" fill="none" stroke="url(#iconGrad)" stroke-width="1.5"/>
      <line x1="-14" y1="-10" x2="38" y2="-10" stroke="url(#iconGrad)" stroke-width="1" opacity="0.5"/>
      <circle cx="-6" cy="-16" r="1.5" fill="url(#iconGrad)"/>
      <circle cx="1" cy="-16" r="1.5" fill="url(#iconGrad)"/>
      <circle cx="8" cy="-16" r="1.5" fill="url(#iconGrad)"/>
    </g>

    <!-- Window 2 (middle) -->
    <g opacity="0.45">
      <rect x="-24" y="-32" width="52" height="64" rx="4" fill="none" stroke="url(#iconGrad)" stroke-width="1.8"/>
      <line x1="-24" y1="-20" x2="28" y2="-20" stroke="url(#iconGrad)" stroke-width="1.2" opacity="0.5"/>
      <circle cx="-16" cy="-26" r="1.5" fill="url(#iconGrad)"/>
      <circle cx="-9" cy="-26" r="1.5" fill="url(#iconGrad)"/>
      <circle cx="-2" cy="-26" r="1.5" fill="url(#iconGrad)"/>
      <!-- Content lines -->
      <line x1="-16" y1="-10" x2="16" y2="-10" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <line x1="-16" y1="-1" x2="8" y2="-1" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
    </g>

    <!-- Window 1 (front, top-left, fully visible) -->
    <g opacity="1">
      <rect x="-34" y="-42" width="52" height="64" rx="4" fill="none" stroke="url(#iconGrad)" stroke-width="2.2"/>
      <line x1="-34" y1="-30" x2="18" y2="-30" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.5"/>
      <circle cx="-26" cy="-36" r="2" fill="url(#iconGrad)" opacity="0.7"/>
      <circle cx="-18" cy="-36" r="2" fill="url(#iconGrad)" opacity="0.7"/>
      <circle cx="-10" cy="-36" r="2" fill="url(#iconGrad)" opacity="0.7"/>
      <!-- Content lines -->
      <line x1="-26" y1="-20" x2="10" y2="-20" stroke="url(#iconGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
      <line x1="-26" y1="-10" x2="2" y2="-10" stroke="url(#iconGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
      <line x1="-26" y1="0" x2="8" y2="0" stroke="url(#iconGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.25"/>
    </g>
  </g>

  <!-- Title -->
  <text x="240" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Wayback-Archive</text>

  <!-- Subtitle -->
  <text x="242" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" fill="#90CAF9" letter-spacing="0.5">Download complete websites from the Wayback Machine</text>

  <!-- Accent line -->
  <rect x="240" y="142" width="80" height="2" rx="1" fill="#42A5F5" opacity="0.6"/>
</svg>